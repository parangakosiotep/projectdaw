name: Build Android APK

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab
  push:
    branches: [ "main", "master" ]
    paths:
      - 'minithesis/CourseFinder/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui-android

    - name: Build and Publish APK
      run: dotnet publish minithesis/CourseFinder/CourseFinder.csproj -f net10.0-android -c Release -p:AndroidPackageFormat=apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CourseFinder-Android-APK
        path: minithesis/CourseFinder/bin/Release/net10.0-android/**/*.apk
